  name: Auto Generate Code

  on:
    pull_request:
      types: [opened, synchronize, reopened]
      branches: [main]

  jobs:
    generate:
      runs-on: ubuntu-latest

      permissions:
        contents: write

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
          with:
            # Checkout the actual PR branch (head_ref)
            ref: ${{ github.head_ref }}
            fetch-depth: 0

        - name: Install uv
          uses: astral-sh/setup-uv@v5
          with:
            python-version: '3.10'

        - name: Install Dependencies
          run: uv sync

        - name: Run Generate Script
          run: uv run python generate.py

        # Automatically commits changes if files were modified
        - name: Commit and Push Changes
          uses: stefanzweifel/git-auto-commit-action@v5
          with:
            commit_message: "chore: auto-generate code from protos"
